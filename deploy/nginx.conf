# /etc/nginx/sites-available/chat.codestep.uz

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name chat.codestep.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.codestep.uz;

    ssl_certificate     /etc/letsencrypt/live/chat.codestep.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.codestep.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    client_max_body_size 10M;

    # Static files — Nginx to'g'ridan-to'g'ri beradi (tezroq)
    location /static/ {
        alias /var/www/auth/aichat/app/static/;
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Barcha qolgan so'rovlar → FastAPI 8035
    location / {
        proxy_pass         http://127.0.0.1:8035;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    access_log /var/log/nginx/sport-ai.access.log;
    error_log  /var/log/nginx/sport-ai.error.log;
}
